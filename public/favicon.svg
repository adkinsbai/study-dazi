<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97066"/>
      <stop offset="100%" stop-color="#e0524a"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#f97066" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect width="64" height="64" rx="16" fill="url(#bg)"/>
  <!-- Graduation cap -->
  <g transform="translate(32,26)" filter="url(#shadow)">
    <polygon points="0,-12 18,-4 0,4 -18,-4" fill="white" opacity="0.95"/>
    <path d="M-12,-2 L-12,10 Q0,18 12,10 L12,-2" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
    <line x1="0" y1="4" x2="0" y2="16" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
    <circle cx="0" cy="18" r="2.5" fill="white" opacity="0.9"/>
  </g>
  <!-- 搭子 text -->
  <text x="32" y="52" text-anchor="middle" font-family="'Noto Serif SC','STSong',serif" font-weight="900" font-size="14" fill="white" letter-spacing="2">搭子</text>
</svg>
